version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "10:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      npm-production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      npm-development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/apps/cms"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "10:15"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      cms-npm-production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      cms-npm-development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/apps/commerce"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "10:30"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      commerce-npm-production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      commerce-npm-development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
