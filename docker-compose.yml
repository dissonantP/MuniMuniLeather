services:
  cms:
    image: node:25-bookworm
    restart: unless-stopped
    user: "1000:1000"
    working_dir: /workspace/apps/cms
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOME: /tmp
      DATABASE_URL: postgres://munimuni:munimuni@postgres:5432/munimuni_payload
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-development-payload-secret-change-before-production}
      NEXT_PUBLIC_SERVER_URL: https://munimunileather.local.dissonant.info
    command: npm run dev:docker
    volumes:
      - .:/workspace
    networks:
      - default
      - traefik-private
    labels:
      traefik.enable: "false"
      traefik.scope: "private"
      traefik.docker.network: traefik-private
      traefik.http.routers.munimuni-cms-https.rule: Host(`munimunileather.local.dissonant.info`)
      traefik.http.routers.munimuni-cms-https.entrypoints: websecure
      traefik.http.routers.munimuni-cms-https.middlewares: authelia@docker
      traefik.http.routers.munimuni-cms-https.tls: "true"
      traefik.http.routers.munimuni-cms-https.tls.certresolver: private-dns
      traefik.http.services.munimuni-cms.loadbalancer.server.port: "3000"

  commerce:
    image: node:25-bookworm
    restart: unless-stopped
    user: "1000:1000"
    working_dir: /workspace/apps/commerce
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOME: /tmp
      DATABASE_URL: postgres://munimuni:munimuni@postgres:5432/munimuni_medusa
      STORE_CORS: https://munimunileather.com,https://munimunileather.local.dissonant.info,https://munimuni-commerce.local.dissonant.info
      ADMIN_CORS: https://munimuni-commerce.local.dissonant.info
      AUTH_CORS: https://munimunileather.local.dissonant.info,https://munimuni-commerce.local.dissonant.info
      __MEDUSA_ADMIN_ADDITIONAL_ALLOWED_HOSTS: munimuni-commerce.local.dissonant.info
      JWT_SECRET: ${MEDUSA_JWT_SECRET:-development-medusa-jwt-secret-change-before-production}
      COOKIE_SECRET: ${MEDUSA_COOKIE_SECRET:-development-medusa-cookie-secret-change-before-production}
    command: npm run dev -- -H 0.0.0.0
    volumes:
      - .:/workspace
    networks:
      - default
      - traefik-private
    labels:
      traefik.enable: "false"
      traefik.scope: "private"
      traefik.docker.network: traefik-private
      traefik.http.routers.munimuni-commerce-https.rule: Host(`munimuni-commerce.local.dissonant.info`)
      traefik.http.routers.munimuni-commerce-https.entrypoints: websecure
      traefik.http.routers.munimuni-commerce-https.middlewares: authelia@docker
      traefik.http.routers.munimuni-commerce-https.tls: "true"
      traefik.http.routers.munimuni-commerce-https.tls.certresolver: private-dns
      traefik.http.services.munimuni-commerce.loadbalancer.server.port: "9000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: munimuni
      POSTGRES_PASSWORD: munimuni
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U munimuni"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  traefik-private:
    name: traefik-private
    external: true
