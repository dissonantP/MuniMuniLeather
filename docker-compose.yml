services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: munimuni
      POSTGRES_PASSWORD: munimuni
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U munimuni"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
